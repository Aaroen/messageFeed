openapi: 3.0.3
info:
  title: messageFeed API
  version: 0.2.0
  description: Phase two and early phase four API contract for the feed reading workflow.
servers:
  - url: http://localhost:60001
    description: Local API server
paths:
  /api/v1/sources:
    get:
      summary: List subscription sources
      responses:
        '200':
          description: Subscription sources
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Source'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      summary: Create subscription source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
      responses:
        '201':
          description: Created source
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Source'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/{id}:
    patch:
      summary: Update subscription source
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourceRequest'
      responses:
        '200':
          description: Updated source
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Source'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/{id}/fetch:
    post:
      summary: Fetch one source immediately
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Fetch result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FetchSourceResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/source-fetches:
    post:
      summary: Queue fetch jobs for all active sources
      description: Enqueues manual fetch jobs for active sources and returns immediately. Clients should poll /api/v1/source-fetches/status when async is true.
      responses:
        '200':
          description: Batch fetch result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FetchSourcesResult'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/source-catalogs:
    get:
      summary: List source catalog entries
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: health_status
          in: query
          schema:
            type: string
            enum:
              - healthy
              - degraded
              - unreachable
              - unknown
        - name: license_status
          in: query
          schema:
            type: string
            enum:
              - unknown
              - allowed
              - restricted
              - blocked
        - name: subscribed
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Source catalog entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceCatalogList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/source-catalogs/search:
    get:
      summary: Search source catalog entries
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: health_status
          in: query
          schema:
            type: string
            enum:
              - healthy
              - degraded
              - unreachable
              - unknown
        - name: license_status
          in: query
          schema:
            type: string
            enum:
              - unknown
              - allowed
              - restricted
              - blocked
        - name: subscribed
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Source catalog entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceCatalogList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/source-catalogs/check:
    post:
      summary: Check source catalog feed health
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckSourceCatalogRequest'
      responses:
        '200':
          description: Source catalog check result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckSourceCatalogResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/import/catalog:
    post:
      summary: Import sources from catalog entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - catalog_ids
              properties:
                catalog_ids:
                  type: array
                  items:
                    type: integer
                    format: int64
                    minimum: 1
      responses:
        '200':
          $ref: '#/components/responses/ImportSourceResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/import/urls:
    post:
      summary: Import sources from feed URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        '200':
          $ref: '#/components/responses/ImportSourceResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/import/opml:
    post:
      summary: Import sources from OPML file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          $ref: '#/components/responses/ImportSourceResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/sources/import-jobs:
    get:
      summary: List source import jobs
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Source import jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceImportJobList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/items:
    get:
      summary: List feed items
      description: Returns timeline items with source metadata and user item state.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: source_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: is_favorite
          in: query
          schema:
            type: boolean
        - name: is_hidden
          in: query
          schema:
            type: boolean
        - name: include_hidden
          in: query
          description: Hidden items are excluded by default unless this is true or is_hidden is set explicitly.
          schema:
            type: boolean
            default: false
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          $ref: '#/components/responses/ItemListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/items/{id}:
    get:
      summary: Get feed item detail
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Feed item detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/items/{id}/read:
    post:
      summary: Set item read state
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_read:
                  type: boolean
                  default: true
      responses:
        '200':
          $ref: '#/components/responses/UserItemStateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/items/{id}/favorite:
    post:
      summary: Set item favorite state
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_favorite:
                  type: boolean
                  default: true
      responses:
        '200':
          $ref: '#/components/responses/UserItemStateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/items/{id}/hide:
    post:
      summary: Set item hidden state
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_hidden:
                  type: boolean
                  default: true
      responses:
        '200':
          $ref: '#/components/responses/UserItemStateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/feed/timeline:
    get:
      summary: List subscribed-source timeline items
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: source_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: is_favorite
          in: query
          schema:
            type: boolean
        - name: is_hidden
          in: query
          schema:
            type: boolean
        - name: include_hidden
          in: query
          schema:
            type: boolean
            default: false
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          $ref: '#/components/responses/ItemListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/feed/recommendations:
    get:
      summary: List recommendation feed prototype items
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: source_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: refresh
          in: query
          schema:
            type: boolean
            default: false
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          $ref: '#/components/responses/ItemListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/feed/view-mode:
    get:
      summary: Get current feed view mode
      responses:
        '200':
          description: Current feed view mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FeedViewPreference'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      summary: Save current feed view mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - view_mode
              properties:
                view_mode:
                  $ref: '#/components/schemas/FeedViewMode'
      responses:
        '200':
          description: Saved feed view mode
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FeedViewPreference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user and bindings
      responses:
        '200':
          description: Current auth status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthMe'
  /api/v1/auth/login:
    post:
      summary: Log in as a local user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/register:
    post:
      summary: Register a local user with an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration succeeded and a session cookie was set
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/password:
    post:
      summary: Change the current local user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/profile:
    get:
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/sessions:
    get:
      summary: List current user active sessions
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/sessions/{id}:
    delete:
      summary: Revoke one current user session
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/auth/account:
    delete:
      summary: Soft-delete the current non-owner account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateAccountRequest'
      responses:
        '200':
          description: Account soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/context:
    get:
      summary: Get current user context for Agent and data-scope aware workflows
      responses:
        '200':
          description: Current user context
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContext'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/logout:
    post:
      summary: Revoke the current session
      responses:
        '200':
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /api/v1/auth/wechat-work/oauth-url:
    get:
      summary: Build a WeChat Work OAuth URL for binding or confirmation
      parameters:
        - name: redirect
          in: query
          schema:
            type: string
            default: /settings
        - name: purpose
          in: query
          schema:
            type: string
            enum:
              - bind
              - confirm
            default: bind
      responses:
        '200':
          description: WeChat Work OAuth URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WeChatWorkOAuthURL'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/wechat-work/callback:
    get:
      summary: Handle WeChat Work OAuth callback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirects back to the configured frontend path
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/auth/bindings:
    get:
      summary: List external account bindings
      responses:
        '200':
          description: External account bindings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuthBinding'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/bindings/{id}/disable:
    post:
      summary: Disable an external account binding
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Disabled binding
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthBinding'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/admin/config:
    get:
      summary: Get runtime admin configuration status
      responses:
        '200':
          description: Admin configuration status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminConfigStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/admin/config/tests/llm:
    post:
      summary: Test the configured LLM provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        '200':
          description: LLM test result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminLLMTestResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/admin/config/tests/wechat-work:
    post:
