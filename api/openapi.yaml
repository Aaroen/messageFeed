                content:
                  type: string
      responses:
        '200':
          description: WeChat Work send test result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminWeChatWorkTestResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
