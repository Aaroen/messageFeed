        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      summary: Create a single-use invite code whose plain value is visible once
      requestBody:
        required: true
        content:
          application/json:
