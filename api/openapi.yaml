                        $ref: '#/components/schemas/AgentApprovalDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/agent/approvals/{token}/reject:
    post:
      summary: Reject a pending Agent approval
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated Agent approval
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentApprovalDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
