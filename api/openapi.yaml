  /api/v1/agent/plans:
    get:
      summary: List Agent plans
      parameters:
        - name: session_id
          in: query
          schema:
            type: integer
            format: int64
        - name: turn_id
          in: query
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Agent plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plans:
                            type: array
                            items:
                              $ref: '#/components/schemas/AgentPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/agent/plans/{plan_id}:
    get:
      summary: Get Agent plan detail
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Agent plan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plan:
                            $ref: '#/components/schemas/AgentPlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/agent/runs/{run_id}:
    get:
      summary: Get Agent run trace detail
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Agent run detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          run:
                            $ref: '#/components/schemas/AgentRun'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/channels/wechat-work/app/callback:
    get:
      summary: Verify WeChat Work app callback URL
      description: Returns the decrypted echostr as plain text for WeChat Work callback URL verification.
      parameters:
        - name: msg_signature
          in: query
          required: true
          schema:
            type: string
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
        - name: nonce
          in: query
          required: true
          schema:
            type: string
        - name: echostr
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Decrypted callback echo string
          content:
            text/plain:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      summary: Receive WeChat Work app callback message
      description: Verifies callback signature, decrypts XML payload and acknowledges the inbound message quickly.
      parameters:
        - name: msg_signature
          in: query
          required: true
          schema:
            type: string
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
        - name: nonce
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      responses:
        '200':
          description: Callback acknowledged
          content:
            text/plain:
              schema:
                type: string
                example: success
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: Callback body is too large
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    ServiceUnavailable:
      description: Service dependency is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIResponse'
    ItemListResult:
      description: Feed items
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/APIResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ItemList'
    UserItemStateResult:
      description: Item state
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/APIResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserItemState'
    ImportSourceResult:
      description: Import source result
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/APIResponse'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ImportSourceResult'
  schemas:
    APIResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: 0 for success; HTTP-like code for current errors.
          example: 0
        message:
          type: string
          example: success
        request_id:
          type: string
        trace_id:
          type: string
          description: OpenTelemetry trace id for correlating API responses with logs and traces.
        data:
          nullable: true
    AuthMe:
      type: object
      required:
        - authenticated
        - login_enabled
        - registration_enabled
        - wechat_work_oauth_enabled
        - bindings
      properties:
        authenticated:
          type: boolean
        login_enabled:
          type: boolean
        registration_enabled:
          type: boolean
        wechat_work_oauth_enabled:
          type: boolean
        user:
          $ref: '#/components/schemas/AuthUser'
        profile:
          $ref: '#/components/schemas/UserProfile'
        bindings:
          type: array
          items:
            $ref: '#/components/schemas/AuthBinding'
    AuthUser:
      type: object
      required:
        - id
        - username
        - display_name
        - role
        - status
        - password_configured
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum:
            - owner
            - user
        status:
          type: string
          enum:
            - active
            - disabled
            - deleted
        password_configured:
          type: boolean
    UserProfile:
      type: object
      properties:
        display_name:
          type: string
        email:
          type: string
        timezone:
          type: string
        language:
          type: string
        region:
          type: string
        bio:
          type: string
        focus_topics:
          type: array
          items:
            type: string
        blocked_topics:
          type: array
          items:
            type: string
        market_focus:
          type: array
          items:
            type: string
        instrument_focus:
          type: array
          items:
            type: string
        risk_preference:
          type: string
        notification_quiet_hours:
          type: string
        agent_notes:
          type: string
        reply_style:
          type: string
        updated_at:
          type: string
          format: date-time
    UserSession:
      type: object
      properties:
        id:
          type: integer
          format: int64
        expires_at:
          type: string
          format: date-time
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        current:
          type: boolean
    UserContext:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        profile:
          $ref: '#/components/schemas/UserProfile'
        bindings:
          type: array
          items:
            $ref: '#/components/schemas/AuthBinding'
        data_scope:
          type: object
          properties:
            user_id:
              type: integer
              format: int64
            readable_domains:
              type: array
              items:
                type: string
            writable_domains:
              type: array
              items:
                type: string
            external_providers:
              type: array
              items:
                type: string
        prompt:
          type: object
          properties:
            plain_text:
              type: string
    AdminUser:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        password_configured:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthBinding:
      type: object
      required:
        - id
        - provider
        - corp_id_masked
        - agent_id
        - external_user_id
        - display_name
        - binding_status
      properties:
        id:
          type: integer
          format: int64
        provider:
          type: string
        corp_id_masked:
          type: string
        agent_id:
          type: string
        external_user_id:
          type: string
        display_name:
          type: string
        binding_status:
          type: string
          enum:
            - active
            - disabled
        verified_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    RegisterRequest:
      type: object
      required:
        - invite_code
        - username
        - password
      properties:
        invite_code:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          format: password
          minLength: 6
        display_name:
          type: string
          maxLength: 80
        email:
          type: string
          format: email
    ChangePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 6
    DeactivateAccountRequest:
      type: object
      required:
        - current_password
      properties:
        current_password:
          type: string
          format: password
    LoginResult:
      type: object
      required:
        - user
        - expires_at
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        expires_at:
          type: string
          format: date-time
    CreateInviteRequest:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
          default: 604800
    InviteCode:
      type: object
      required:
        - id
        - role
        - max_uses
        - use_count
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        role:
          type: string
          enum:
            - user
        max_uses:
          type: integer
        use_count:
          type: integer
        status:
          type: string
          enum:
            - active
            - revoked
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateInviteResult:
      type: object
      required:
        - invite
        - code
      properties:
        invite:
          $ref: '#/components/schemas/InviteCode'
        code:
          type: string
          description: Plain invite code. It is only returned once when created.
    WeChatWorkOAuthURL:
      type: object
      required:
        - url
        - expires_at
      properties:
        url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    AdminConfigStatus:
      type: object
      properties:
        updated_at:
          type: string
          format: date-time
        runtime:
          type: object
          additionalProperties: true
        database:
          type: object
          properties:
            configured:
              type: boolean
        auth:
          type: object
          properties:
            local_login_enabled:
              type: boolean
            session_cookie:
              type: string
            session_secure:
              type: boolean
            session_ttl_seconds:
              type: integer
              format: int64
            oauth_state_ttl_seconds:
              type: integer
              format: int64
        wechat_work:
          type: object
          additionalProperties: true
        llm:
          type: object
          additionalProperties: true
        observability:
          type: object
          additionalProperties: true
        endpoints:
          type: object
          additionalProperties:
            type: string
        requirements:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              items:
                type: array
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    configured:
                      type: boolean
                    secret:
                      type: boolean
    AdminLLMTestResult:
      type: object
      properties:
        status:
          type: string
        provider:
          type: string
        model:
          type: string
        latency_ms:
          type: integer
          format: int64
        response_text:
          type: string
        checked_at:
          type: string
          format: date-time
    AdminWeChatWorkTestResult:
      type: object
      properties:
        status:
          type: string
        errcode:
          type: integer
        errmsg:
          type: string
        message_id:
          type: string
        invalid_user:
          type: string
        invalid_party:
          type: string
        invalid_tag:
          type: string
        unlicensed_user:
          type: string
        latency_ms:
          type: integer
          format: int64
        checked_at:
          type: string
          format: date-time
    AgentApprovalDetail:
      type: object
      required:
        - id
        - status
        - channel
        - expires_at
        - metadata
      properties:
        id:
          type: integer
          format: int64
        plan_id:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - expired
        channel:
          type: string
        expires_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    AgentPlan:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        session_id:
          type: integer
          format: int64
        turn_id:
          type: integer
          format: int64
        controller_run_id:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - draft
            - awaiting_approval
            - approved
            - rejected
            - expired
            - executing
            - completed
            - failed
        goal:
          type: string
        summary:
          type: string
        impact_summary:
          type: string
        risk_level:
          type: string
          enum:
            - low
            - medium
            - high
        confirmation_policy:
          type: string
          enum:
            - auto
            - prompt
            - forbidden
        allowed_scopes:
          type: array
          items:
            type: string
        dedupe_key:
          type: string
        policy_decision:
          type: string
          enum:
            - allow
            - prompt
            - forbidden
        policy_reason:
          type: string
        expires_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
        rejected_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        failed_at:
          type: string
          format: date-time
        error_message:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AgentPlanStep'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/AgentPlanApproval'
    AgentPlanStep:
      type: object
      properties:
        id:
          type: integer
          format: int64
        plan_id:
          type: integer
          format: int64
        step_order:
          type: integer
        status:
          type: string
          enum:
            - pending
            - approved
            - executing
