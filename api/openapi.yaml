        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/agent/approvals/{token}:
    get:
      summary: Get an Agent approval by one-time token
      parameters:
        - name: token
