# 当前 WSL2/K3s 多角色环境的非敏感覆盖配置，需与 values.yaml 一同使用。

# 固定资源名称以接管现有 messagefeed 工作负载。
fullnameOverride: messagefeed

# 当前单节点地址。网络策略仅允许节点作为 gateway/观测 NodePort 的入口。
scheduling:
  nodeSelector:
    kubernetes.io/hostname: aroen
  topologySpread:
    whenUnsatisfiable: ScheduleAnyway

networkPolicy:
  gatewayIngressCIDRs:
    - 192.168.3.40/32
  observabilityIngressCIDRs:
    - 192.168.3.40/32
  kubernetesAPI:
    serviceCIDR: 10.43.0.1/32
    nodeCIDRs:
      - 192.168.3.40/32
  httpsEgress:
    - cidr: 0.0.0.0/0
      except:
        - 10.42.0.0/16
        - 10.43.0.0/16
      ports:
        - 443
  feedEgress:
    - cidr: 0.0.0.0/0
      except:
        - 10.42.0.0/16
        - 10.43.0.0/16
      ports:
        - 80
  llmEgress:
    - cidr: 198.18.0.1/32
      ports:
        - 15721
  cloudflaredEgress:
    - cidr: 0.0.0.0/0
      except:
        - 10.42.0.0/16
        - 10.43.0.0/16
      ports:
        - 443
        - 7844

# 创建默认 Retain StorageClass；现有 PVC 保持原 local-path，避免修改不可变字段。
storageClass:
  create: true
  name: local-path-retain
  defaultClass: true

# 使用按后端内容哈希标记且已导入 K3s containerd 的 API 镜像。
api:
  replicaCount: 2
  image:
    repository: messagefeed-api
    tag: ha11-20260718-6c86f3721986
    pullPolicy: IfNotPresent

# 在 K3s 中启用四类独立 worker；副本数可按任务吞吐独立调整。
workers:
  metrics:
    port: 9090
    bindAddr: 0.0.0.0:9090
  source:
    enabled: true
  notification:
    enabled: true
  agentScheduler:
    enabled: true
  embedding:
    enabled: true

# 复用已导入 K3s containerd 的现有 Web 镜像。
web:
  replicaCount: 2
  image:
    repository: messagefeed-web
    tag: allinone-0703de0
    pullPolicy: IfNotPresent

# PostgreSQL 复用现有认证 Secret 和已绑定的 local-path PVC。
postgresql:
  auth:
    existingSecret: messagefeed-postgres-secret
  persistence:
    storageClass: local-path

# 应用敏感配置继续引用集群中现有 Secret，不在 values 中保存明文。
appSecret:
  existingSecret: messagefeed-app-secret

# gateway 继续引用现有 Caddy 证书和 CA bundle Secret。
gateway:
  replicaCount: 2
  tls:
    existingSecret: messagefeed-caddy-certs

# cloudflared 复用现有 Tunnel Secret，并使用 WSL 节点网络出站。
cloudflared:
  replicaCount: 2
  image:
    tag: "2026.6.1"
  existingSecret: messagefeed-cloudflared-secret
  hostNetwork: true
  metricsPortPrefix: "201"

# 覆盖当前公网地址、企业微信及模型服务等非敏感应用参数。
appConfig:
  publicBaseURL: https://aroen.eu.cc
  deploymentMode: cluster
  defaultAppRole: all
  environment: wsl-k3s
  authSessionCookieSecure: "false"
  wechatWorkCorpID: ww8ee8972ac7733fed
  wechatWorkAgentID: "1000002"
  llmProvider: openai_compatible
  llmBaseURL: http://198.18.0.1:15721/v1
  llmModel: gpt-5.6-sol
  embeddingProvider: openai_compatible
  embeddingBaseURL: https://ai.hybgzs.com/v1
  embeddingModel: Qwen/Qwen3-Embedding-8B

# 启用完整观测栈；现有观测 PVC 继续使用不可变的 local-path StorageClass。
observability:
  enabled: true
  storageClass: local-path
  grafana:
    existingSecret: messagefeed-grafana-secret
