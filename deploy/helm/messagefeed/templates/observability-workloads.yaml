{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "messagefeed.selectorLabels" (dict "name" "prometheus" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/observability-config.yaml") . | sha256sum }}
      labels:
        {{- include "messagefeed.selectorLabels" (dict "name" "prometheus" "root" .) | nindent 8 }}
        app.kubernetes.io/part-of: messagefeed
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image }}
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--storage.tsdb.retention.time=7d", "--web.enable-lifecycle"]
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet: {path: /-/ready, port: http}
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.observability.resources | nindent 12 }}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml, readOnly: true}
            - {name: data, mountPath: /prometheus}
      volumes:
        - name: config
          configMap: {name: messagefeed-observability-config}
        - name: data
          persistentVolumeClaim: {claimName: prometheus-data}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "prometheus" "root" .) | nindent 4 }}
  ports:
    - {name: http, port: 9090, targetPort: http}
---
