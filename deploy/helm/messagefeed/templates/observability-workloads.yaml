apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "messagefeed.selectorLabels" (dict "name" "grafana" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/observability-config.yaml") . | sha256sum }}
      labels:
        {{- include "messagefeed.selectorLabels" (dict "name" "grafana" "root" .) | nindent 8 }}
        app.kubernetes.io/part-of: messagefeed
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: {{ .Values.observability.grafana.adminUser | quote }}}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: {{ .Values.observability.grafana.adminPassword | quote }}}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: {{ .Values.observability.grafana.anonymousEnabled | quote }}}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: Admin}
            - {name: GF_USERS_DEFAULT_THEME, value: light}
          ports:
            - {name: http, containerPort: 3000}
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.observability.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: config, mountPath: /etc/grafana/provisioning/datasources/datasources.yml, subPath: datasources.yml, readOnly: true}
            - {name: config, mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml, subPath: dashboards.yml, readOnly: true}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards, readOnly: true}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: grafana-data}
        - name: config
          configMap: {name: messagefeed-observability-config}
        - name: dashboards
          configMap: {name: messagefeed-grafana-dashboard}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "grafana" "root" .) | nindent 4 }}
  ports:
    - {name: http, port: 3000, targetPort: http}
{{- end }}
