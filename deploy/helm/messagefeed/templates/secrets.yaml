{{/* 在未指定 existingSecret 时创建应用所需 Secret。 */}}
{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "messagefeed.postgresSecretName" . }}
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password is required when postgresql.auth.existingSecret is empty" .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
---
{{- end }}
{{- if not .Values.appSecret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "messagefeed.appSecretName" . }}
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "messagefeed.databaseURL" . | quote }}
  AUTH_OWNER_PASSWORD: {{ required "appSecret.authOwnerPassword is required when appSecret.existingSecret is empty" .Values.appSecret.authOwnerPassword | quote }}
  WECHAT_WORK_SECRET: {{ .Values.appSecret.wechatWorkSecret | quote }}
  WECHAT_WORK_CALLBACK_TOKEN: {{ .Values.appSecret.wechatWorkCallbackToken | quote }}
  WECHAT_WORK_ENCODING_AES_KEY: {{ .Values.appSecret.wechatWorkEncodingAESKey | quote }}
  LLM_API_KEY: {{ .Values.appSecret.llmAPIKey | quote }}
  LLM_CONFIG_SECRET: {{ .Values.appSecret.llmConfigSecret | quote }}
  EMBEDDING_API_KEY: {{ .Values.appSecret.embeddingAPIKey | quote }}
{{- end }}
{{- if and .Values.gateway.enabled (not .Values.gateway.tls.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "messagefeed.caddySecretName" . }}
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
type: Opaque
stringData:
  gateway-dev.crt: {{ required "gateway.tls.crt is required when gateway.tls.existingSecret is empty" .Values.gateway.tls.crt | quote }}
  gateway-dev.key: {{ required "gateway.tls.key is required when gateway.tls.existingSecret is empty" .Values.gateway.tls.key | quote }}
  cloudflared-ca-bundle.crt: {{ required "gateway.tls.caBundle is required when gateway.tls.existingSecret is empty" .Values.gateway.tls.caBundle | quote }}
{{- end }}
{{- if and .Values.cloudflared.enabled (not .Values.cloudflared.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "messagefeed.cloudflaredSecretName" . }}
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLOUDFLARED_TUNNEL_TOKEN: {{ required "cloudflared.tunnelToken is required when cloudflared.existingSecret is empty" .Values.cloudflared.tunnelToken | quote }}
  CLOUDFLARED_PROTOCOL: {{ .Values.cloudflared.protocol | quote }}
{{- end }}
