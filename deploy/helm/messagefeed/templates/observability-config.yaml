{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: messagefeed-observability-config
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
data:
  prometheus.yml: |
{{ .Files.Get "files/observability/prometheus.yml" | indent 4 }}
  loki.yml: |
{{ .Files.Get "files/observability/loki.yml" | indent 4 }}
  tempo.yml: |
{{ .Files.Get "files/observability/tempo.yml" | indent 4 }}
  otel-collector.yml: |
{{ .Files.Get "files/observability/otel-collector.yml" | indent 4 }}
  datasources.yml: |
{{ .Files.Get "files/observability/datasources.yml" | indent 4 }}
  dashboards.yml: |
{{ .Files.Get "files/observability/dashboards.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: messagefeed-grafana-dashboard
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
data:
  messagefeed-overview.json: |
{{ .Files.Get "files/observability/messagefeed-overview.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: messagefeed-promtail-config
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_uid]
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
        pipeline_stages:
          - cri: {}
{{- end }}

