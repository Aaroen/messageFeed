{{/* 部署只运行业务 HTTP 的 API，数据库迁移由独立 migrate Job 执行。 */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messagefeed-api
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: messagefeed-api
    app.kubernetes.io/component: api
    messagefeed.io/app-role: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "messagefeed.selectorLabels" (dict "name" "messagefeed-api" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "messagefeed.selectorLabels" (dict "name" "messagefeed-api" "root" .) | nindent 8 }}
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: messagefeed
        messagefeed.io/app-role: api
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "messagefeed.fullname" . }}-api
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          envFrom:
            - configMapRef:
                name: messagefeed-app-config
            - secretRef:
                name: {{ include "messagefeed.appSecretName" . }}
          env:
            - name: APP_ROLE
              value: api
            - name: OTEL_SERVICE_NAME
              value: messagefeed-api
            - name: APP_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- include "messagefeed.podScheduling" (dict "root" . "name" "messagefeed-api" "config" .Values.api) | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: api
spec:
  type: ClusterIP
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "messagefeed-api" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: messagefeed-api
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: messagefeed-api
spec:
  type: ClusterIP
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "messagefeed-api" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
