{{/* 应用进程不访问 Kubernetes API；为每个运行角色提供独立、零权限且不挂载令牌的身份。 */}}
{{- $root := . -}}
{{- range $role := list "api" "source-worker" "notification-worker" "agent-scheduler-worker" "embedding-worker" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "messagefeed.fullname" $root }}-{{ $role }}
  labels:
    {{- include "messagefeed.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $role }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "messagefeed.fullname" $root }}-{{ $role }}
  labels:
    {{- include "messagefeed.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $role }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "messagefeed.fullname" $root }}-{{ $role }}
  labels:
    {{- include "messagefeed.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $role }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "messagefeed.fullname" $root }}-{{ $role }}
subjects:
  - kind: ServiceAccount
    name: {{ include "messagefeed.fullname" $root }}-{{ $role }}
    namespace: {{ $root.Release.Namespace }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "messagefeed.fullname" . }}-migrate
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "messagefeed.fullname" . }}-migrate
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "messagefeed.fullname" . }}-migrate
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "messagefeed.fullname" . }}-migrate
subjects:
  - kind: ServiceAccount
    name: {{ include "messagefeed.fullname" . }}-migrate
    namespace: {{ .Release.Namespace }}
