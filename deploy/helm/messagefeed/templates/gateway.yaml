{{/* 部署 Caddy HTTPS gateway 及内部访问 Service。 */}}
{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "messagefeed.selectorLabels" (dict "name" "gateway" "root" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
      labels:
        {{- include "messagefeed.selectorLabels" (dict "name" "gateway" "root" .) | nindent 8 }}
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: messagefeed
    spec:
      automountServiceAccountToken: false
      {{- include "messagefeed.podScheduling" (dict "root" . "name" "gateway") | nindent 6 }}
      containers:
        - name: caddy
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: messagefeed-gateway-config
          ports:
            - name: https
              containerPort: 8443
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-certs
              mountPath: /etc/caddy/certs
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
      volumes:
        - name: caddyfile
          configMap:
            name: messagefeed-caddy-config
        - name: caddy-certs
          secret:
            secretName: {{ include "messagefeed.caddySecretName" . }}
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.gateway.service.port }}
      targetPort: https
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-dev
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway-dev
spec:
  type: ClusterIP
  selector:
    {{- include "messagefeed.selectorLabels" (dict "name" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.gateway.service.port }}
      targetPort: https
{{- end }}
