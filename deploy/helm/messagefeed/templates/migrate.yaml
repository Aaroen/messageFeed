{{/* 独立执行数据库迁移；后端镜像内置 migrate CLI 与 migrations 目录。 */}}
{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: messagefeed-migrate
  labels:
    {{- include "messagefeed.labels" . | nindent 4 }}
    app.kubernetes.io/name: messagefeed-migrate
    app.kubernetes.io/component: migration
    messagefeed.io/app-role: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  podFailurePolicy:
    rules:
      - action: FailJob
        onExitCodes:
          containerName: migrate
          operator: NotIn
          values:
            - 0
  template:
    metadata:
      labels:
        {{- include "messagefeed.selectorLabels" (dict "name" "messagefeed-migrate" "root" .) | nindent 8 }}
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: messagefeed
        messagefeed.io/app-role: migrate
    spec:
      serviceAccountName: {{ include "messagefeed.fullname" . }}-migrate
      automountServiceAccountToken: false
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              until nc -z -w 2 messagefeed-postgres 5432; do
                echo "waiting for PostgreSQL network readiness"
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: APP_ROLE
              value: migrate
            - name: OTEL_SERVICE_NAME
              value: messagefeed-migrate
            - name: DEPLOYMENT_MODE
              value: {{ .Values.appConfig.deploymentMode | quote }}
            - name: MIGRATIONS_PATH
              value: {{ .Values.migrations.path | quote }}
            - name: MIGRATION_PHASE
              value: {{ .Values.migrations.phase | quote }}
            - name: MIGRATION_LOCK_TIMEOUT
              value: {{ .Values.migrations.lockTimeoutSeconds | quote }}
            - name: APP_NODE_ID
              value: messagefeed-migrate
            - name: DATABASE_URL
              {{- if .Values.appSecret.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "messagefeed.appSecretName" . }}
                  key: DATABASE_URL
              {{- else }}
              value: {{ include "messagefeed.databaseURL" . | quote }}
              {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- include "messagefeed.podScheduling" (dict "root" . "name" "messagefeed-migrate") | nindent 6 }}
{{- end }}
