# 配置 Prometheus 抓取 messageFeed、Prometheus 和 OTel 指标。
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: messagefeed-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:60001
        labels:
          service: messagefeed-api
          environment: development

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
