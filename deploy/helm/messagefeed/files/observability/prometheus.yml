# 配置 Prometheus 抓取 messageFeed、Prometheus 和 OTel 指标。
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: messagefeed-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:60001
        labels:
          service: messagefeed-api
          app_role: api
          environment: development

  - job_name: messagefeed-source-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - source-worker:9090
        labels:
          service: messagefeed-source-worker
          app_role: source-worker
          environment: development

  - job_name: messagefeed-notification-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-worker:9090
        labels:
          service: messagefeed-notification-worker
          app_role: notification-worker
          environment: development

  - job_name: messagefeed-agent-scheduler-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - agent-scheduler-worker:9090
        labels:
          service: messagefeed-agent-scheduler-worker
          app_role: agent-scheduler-worker
          environment: development

  - job_name: messagefeed-embedding-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - embedding-worker:9090
        labels:
          service: messagefeed-embedding-worker
          app_role: embedding-worker
          environment: development

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
