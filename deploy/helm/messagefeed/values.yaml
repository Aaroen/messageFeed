# messageFeed 多角色 Helm Chart 默认配置；敏感值应通过 existingSecret 提供。

# 资源命名覆盖配置，留空时使用 Helm release 与 Chart 名生成名称。
nameOverride: ""
fullnameOverride: ""

# 私有镜像仓库认证 Secret 列表，公开或本地镜像无需配置。
imagePullSecrets: []

# 为新建 PVC 提供默认 Retain StorageClass，避免 PVC 删除时自动清理底层数据。
storageClass:
  create: true
  name: local-path-retain
  provisioner: rancher.io/local-path
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer
  defaultClass: true

# 后端 API 工作负载，仅运行业务 HTTP 服务。
api:
  replicaCount: 1
  image:
    repository: messagefeed-api
    tag: role9-20260718-8a454cb690ec
    pullPolicy: IfNotPresent
  service:
    port: 60001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# 四类独立后台 worker。每个 worker 使用同一后端镜像，通过 APP_ROLE 固定职责。
workers:
  metrics:
    port: 9090
    bindAddr: 0.0.0.0:9090
  source:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: "1"
        memory: 512Mi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  notification:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  agentScheduler:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: "1"
        memory: 512Mi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  embedding:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 1Gi
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

# Web 静态资源服务，由独立 Caddy 容器监听 8080 端口。
web:
  enabled: true
  replicaCount: 1
  image:
    repository: messagefeed-web
    tag: allinone-0703de0
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

# 内置单副本 PostgreSQL 15/pgvector 数据库及其持久卷配置。
postgresql:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg15
    pullPolicy: IfNotPresent
  auth:
    existingSecret: ""
    username: messagefeed
    password: ""
    database: messagefeed
  persistence:
    enabled: true
    storageClass: local-path-retain
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# 数据库迁移配置，启用后由独立 Helm pre-install/pre-upgrade Job 执行 APP_ROLE=migrate。
migrations:
  enabled: true
  path: migrations
  backoffLimit: 1
  activeDeadlineSeconds: 600
  image:
    repository: migrate/migrate
    tag: v4.19.1
    pullPolicy: IfNotPresent

# Caddy HTTPS gateway，统一转发 API 与 Web 请求并管理回源 TLS。
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: caddy
    tag: 2.10.2-alpine
    pullPolicy: IfNotPresent
  siteAddress: https://localhost:8443
  defaultSNI: localhost
  service:
    type: ClusterIP
    port: 8443
  tls:
    existingSecret: messagefeed-caddy-certs
    crt: ""
    key: ""
    caBundle: ""
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

# Cloudflare Tunnel 连接器，通过出站连接将公网流量转发至 gateway。
cloudflared:
  enabled: true
  replicaCount: 1
  image:
    repository: cloudflare/cloudflared
    tag: "2026.6.1"
    pullPolicy: IfNotPresent
  existingSecret: ""
  tunnelToken: ""
  protocol: http2
  hostNetwork: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# 应用非敏感运行参数，渲染到 messagefeed-app-config ConfigMap。
appConfig:
  publicBaseURL: https://localhost:8443
  deploymentMode: single_node
  defaultAppRole: all
  databaseMaxOpenConns: "10"
  databaseMaxIdleConns: "2"
  environment: k3s
  logLevel: info
  trustedProxyCIDRs: ""
  observabilityTraceEnabled: true
  otelServiceName: messagefeed
  otelServiceVersion: 0.2.0
  otelTracesSamplerArg: "1.0"
  authOwnerUsername: aroen
  authSessionCookieName: messagefeed_session
  authSessionTTL: "604800"
  authSessionCookieSecure: "true"
  authOAuthStateTTL: "600"
  authApprovalTokenTTL: "1800"
  wechatWorkCorpID: ""
  wechatWorkAgentID: ""
  llmProvider: ""
  llmBaseURL: ""
  llmModel: ""
  embeddingProvider: ""
  embeddingBaseURL: ""
  embeddingModel: ""
  embeddingDimension: "4096"
  timezone: UTC

# 应用敏感参数，生产环境应设置 existingSecret，避免在 values 文件中保存明文。
appSecret:
  existingSecret: ""
  authOwnerPassword: ""
  wechatWorkSecret: ""
  wechatWorkCallbackToken: ""
  wechatWorkEncodingAESKey: ""
  llmAPIKey: ""
  llmConfigSecret: ""
  embeddingAPIKey: ""

# 可选单实例观测栈，包含 Prometheus、Loki、Tempo、OTel Collector、Grafana 和 Promtail。
observability:
  enabled: true
  storageClass: local-path-retain
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
  prometheus:
    image: prom/prometheus:v3.8.1
    storage: 5Gi
  loki:
    image: grafana/loki:3.5.8
    storage: 5Gi
  tempo:
    image: grafana/tempo:2.9.0
    storage: 5Gi
  otelCollector:
    image: otel/opentelemetry-collector-contrib:0.142.0
  grafana:
    image: grafana/grafana:12.3.0
    storage: 5Gi
    existingSecret: messagefeed-grafana-secret
    anonymousEnabled: true
  promtail:
    image: grafana/promtail:3.5.8
