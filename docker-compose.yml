# messageFeed docker-compose 配置
# 本文件定义本地开发和验证所需的服务。

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: messagefeed-postgres
    restart: unless-stopped
    logging: *default-logging

    # 环境变量配置
    environment:
      # 数据库超级用户密码（仅开发环境使用简单密码，生产环境应使用强密码）
      POSTGRES_PASSWORD: devpassword
      # 应用数据库名称
      POSTGRES_DB: messagefeed
      # 应用数据库用户
      POSTGRES_USER: messagefeed
      # 时区设置
      TZ: UTC
      PGTZ: UTC

    # 端口映射（宿主机:容器）
    # 仅绑定本机回环，避免数据库暴露到局域网。
    ports:
      - "127.0.0.1:5432:5432"

    # 数据卷挂载
    # 持久化数据库数据，避免容器重启后数据丢失
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # 健康检查
    # 确保数据库完全启动后再启动依赖服务
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messagefeed -d messagefeed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # 网络配置
    networks:
      - messagefeed-network

  # ==================== 数据库迁移服务 ====================
  migrate:
    image: migrate/migrate:v4.19.1
    restart: "no"
    logging: *default-logging

    # 迁移只在 PostgreSQL 健康后执行一次，API 依赖迁移成功完成后启动
    depends_on:
      postgres:
        condition: service_healthy

    # 只读挂载正式迁移文件；down 迁移不会被自动执行
    volumes:
      - ./migrations:/migrations:ro

    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://messagefeed:devpassword@postgres:5432/messagefeed?sslmode=disable"
      - "up"

    networks:
      - messagefeed-network

  # ==================== messageFeed API 服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: messagefeed:latest
    container_name: messagefeed-api
    restart: unless-stopped

    # 依赖关系：等待 PostgreSQL 健康且数据库迁移完成后再启动
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    # 环境变量配置
    environment:
      # HTTP 服务配置
      BIND_ADDR: 0.0.0.0:60001
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost:8443}

      # 运行时配置
      APP_NODE_ID: docker-api-1
      DEPLOYMENT_MODE: single_node
      ENVIRONMENT: development
      LOG_LEVEL: info

      # 观测配置
      OTEL_SERVICE_NAME: messagefeed-api
      OTEL_SERVICE_VERSION: 0.2.0
      OBSERVABILITY_TRACE_ENABLED: ${OBSERVABILITY_TRACE_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER_ARG: "1.0"

      # 数据库配置
      DATABASE_URL: postgres://messagefeed:devpassword@postgres:5432/messagefeed?sslmode=disable

      # Web 登录与授权配置
      AUTH_OWNER_USERNAME: ${AUTH_OWNER_USERNAME:-aroen}
      AUTH_OWNER_PASSWORD: ${AUTH_OWNER_PASSWORD:-***REMOVED-FROM-GIT-HISTORY***}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-messagefeed_session}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-604800}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-false}
      AUTH_OAUTH_STATE_TTL: ${AUTH_OAUTH_STATE_TTL:-600}
      AUTH_APPROVAL_TOKEN_TTL: ${AUTH_APPROVAL_TOKEN_TTL:-1800}

      # 企业微信自建应用对话入口配置
      WECHAT_WORK_CORP_ID: ${WECHAT_WORK_CORP_ID:-}
      WECHAT_WORK_AGENT_ID: ${WECHAT_WORK_AGENT_ID:-}
      WECHAT_WORK_SECRET: ${WECHAT_WORK_SECRET:-}
      WECHAT_WORK_CALLBACK_TOKEN: ${WECHAT_WORK_CALLBACK_TOKEN:-}
      WECHAT_WORK_ENCODING_AES_KEY: ${WECHAT_WORK_ENCODING_AES_KEY:-}

      # AI 模型配置
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}

      # Embedding 模型配置
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-4096}

      # 时区设置
      TZ: UTC

    # 端口映射
    ports:
      - "127.0.0.1:60001:60001"

    # 允许容器内 API 通过 host.docker.internal 访问宿主机上的 ccswitch 代理。
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:60001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    # 网络配置
    networks:
      - messagefeed-network

    # 日志配置
    logging: *default-logging

  # ==================== 生产态 Web 静态服务 ====================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: messagefeed-web:latest
    container_name: messagefeed-web
    restart: unless-stopped

    expose:
      - "8080"

    networks:
      - messagefeed-network

    logging: *default-logging

  # ==================== 生产态统一入口 ====================
  gateway:
    image: caddy:2.10.2-alpine
    container_name: messagefeed-gateway
    restart: unless-stopped
    logging: *default-logging

    environment:
      GATEWAY_SITE_ADDRESS: ${GATEWAY_SITE_ADDRESS:-https://localhost:8443}
      GATEWAY_DEFAULT_SNI: ${GATEWAY_DEFAULT_SNI:-localhost}

    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

    ports:
      - "127.0.0.1:${GATEWAY_HTTPS_PORT:-8443}:8443"

    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

    networks:
      messagefeed-network:
        aliases:
          - gateway-dev

  # ==================== 开发态 API 服务 ====================
  api-dev:
    image: golang:1.26.1-alpine
    container_name: messagefeed-api-dev
    profiles:
      - dev
    restart: unless-stopped
    working_dir: /workspace
    command: ["go", "run", "./cmd/api"]

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    environment:
      BIND_ADDR: 0.0.0.0:60001
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost:8443}
      APP_NODE_ID: docker-api-dev-1
      DEPLOYMENT_MODE: single_node
      ENVIRONMENT: development
      LOG_LEVEL: debug
      OBSERVABILITY_TRACE_ENABLED: ${OBSERVABILITY_TRACE_ENABLED:-true}
      DATABASE_URL: postgres://messagefeed:devpassword@postgres:5432/messagefeed?sslmode=disable
      AUTH_OWNER_USERNAME: ${AUTH_OWNER_USERNAME:-aroen}
      AUTH_OWNER_PASSWORD: ${AUTH_OWNER_PASSWORD:-***REMOVED-FROM-GIT-HISTORY***}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-messagefeed_session}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-604800}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE:-false}
      AUTH_OAUTH_STATE_TTL: ${AUTH_OAUTH_STATE_TTL:-600}
      AUTH_APPROVAL_TOKEN_TTL: ${AUTH_APPROVAL_TOKEN_TTL:-1800}
      WECHAT_WORK_CORP_ID: ${WECHAT_WORK_CORP_ID:-}
      WECHAT_WORK_AGENT_ID: ${WECHAT_WORK_AGENT_ID:-}
      WECHAT_WORK_SECRET: ${WECHAT_WORK_SECRET:-}
      WECHAT_WORK_CALLBACK_TOKEN: ${WECHAT_WORK_CALLBACK_TOKEN:-}
      WECHAT_WORK_ENCODING_AES_KEY: ${WECHAT_WORK_ENCODING_AES_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      TZ: UTC

    volumes:
      - .:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

    expose:
      - "60001"

    # 允许容器内 API 通过 host.docker.internal 访问宿主机上的 ccswitch 代理。
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:60001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    develop:
      watch:
        - action: sync+restart
          path: ./cmd
          target: /workspace/cmd
        - action: sync+restart
          path: ./internal
          target: /workspace/internal
        - action: sync+restart
          path: ./go.mod
          target: /workspace/go.mod
        - action: sync+restart
          path: ./go.sum
          target: /workspace/go.sum

    networks:
      - messagefeed-network

    logging: *default-logging

  # ==================== 开发态 Web 服务 ====================
  web-dev:
    image: node:24-alpine
    container_name: messagefeed-web-dev
    profiles:
      - dev
    restart: unless-stopped
    working_dir: /workspace/web
    command: ["sh", "-c", "test -x node_modules/.bin/vite || npm ci; npm run dev -- --host 0.0.0.0"]

    environment:
      VITE_API_TARGET: http://api-dev:60001
      VITE_HMR_CLIENT_PORT: ${VITE_HMR_CLIENT_PORT:-8443}
      VITE_HMR_PROTOCOL: wss
      VITE_HMR_HOST: ${VITE_HMR_HOST:-}

    volumes:
      - .:/workspace
      - web_node_modules:/workspace/web/node_modules

    expose:
      - "5173"

    depends_on:
      api-dev:
        condition: service_healthy

    networks:
      - messagefeed-network

    logging: *default-logging

  # ==================== 开发态统一入口 ====================
  gateway-dev:
    image: caddy:2.10.2-alpine
    container_name: messagefeed-gateway-dev
    profiles:
      - dev
    restart: unless-stopped
    logging: *default-logging

    environment:
      GATEWAY_SITE_ADDRESS: ${GATEWAY_SITE_ADDRESS:-https://localhost:8443}
      GATEWAY_DEFAULT_SNI: ${GATEWAY_DEFAULT_SNI:-localhost}

    volumes:
      - ./deploy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

    ports:
      - "127.0.0.1:${GATEWAY_HTTPS_PORT:-8443}:8443"

    depends_on:
      api-dev:
        condition: service_healthy
      web-dev:
        condition: service_started

    develop:
      watch:
        - action: sync+restart
          path: ./deploy/caddy/Caddyfile.dev
          target: /etc/caddy/Caddyfile

    networks:
      - messagefeed-network

  # ==================== Cloudflare Tunnel 入口 ====================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: messagefeed-cloudflared
    profiles:
      - cloudflare
    restart: unless-stopped
    logging: *default-logging
    environment:
      # SSL_CERT_FILE 指向本地 CA bundle，供 cloudflared 校验回源 gateway-dev 证书
      SSL_CERT_FILE: /etc/messagefeed-certs/cloudflared-ca-bundle.crt
    command: ["tunnel", "--no-autoupdate", "--protocol", "${CLOUDFLARED_PROTOCOL:-auto}", "run", "--token", "${CLOUDFLARED_TUNNEL_TOKEN:-}"]
    volumes:
      - ./deploy/caddy/certs:/etc/messagefeed-certs:ro
    depends_on:
      gateway:
        condition: service_started
    networks:
      - messagefeed-network

  # ==================== 开发态 Cloudflare Tunnel 入口 ====================
  cloudflared-dev:
    image: cloudflare/cloudflared:latest
    container_name: messagefeed-cloudflared-dev
    profiles:
      - cloudflare-dev
    restart: unless-stopped
    logging: *default-logging
    environment:
      # SSL_CERT_FILE 指向本地 CA bundle，供 cloudflared 校验回源 gateway-dev 证书
      SSL_CERT_FILE: /etc/messagefeed-certs/cloudflared-ca-bundle.crt
    command: ["tunnel", "--no-autoupdate", "--protocol", "${CLOUDFLARED_PROTOCOL:-auto}", "run", "--token", "${CLOUDFLARED_TUNNEL_TOKEN:-}"]
    volumes:
      - ./deploy/caddy/certs:/etc/messagefeed-certs:ro
    depends_on:
      gateway-dev:
        condition: service_started
    networks:
      - messagefeed-network

  # ==================== Prometheus 指标存储 ====================
  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: messagefeed-prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - messagefeed-network

  # ==================== Loki 日志存储 ====================
  loki:
    image: grafana/loki:3.5.8
    container_name: messagefeed-loki
    restart: unless-stopped
    logging: *default-logging
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ./ops/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - messagefeed-network

  # ==================== Promtail 日志采集 ====================
  promtail:
    image: grafana/promtail:3.5.8
    container_name: messagefeed-promtail
    restart: unless-stopped
    logging: *default-logging
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    volumes:
      - ./ops/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - messagefeed-network

  # ==================== Tempo 链路追踪存储 ====================
  tempo:
    image: grafana/tempo:2.9.0
    container_name: messagefeed-tempo
    restart: unless-stopped
    logging: *default-logging
    command:
      - "-config.file=/etc/tempo/tempo.yml"
    volumes:
      - ./ops/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4319:4317"
    networks:
      - messagefeed-network

  # ==================== OpenTelemetry Collector ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.142.0
    container_name: messagefeed-otel-collector
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--config=/etc/otel-collector.yml"
    volumes:
      - ./ops/observability/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    depends_on:
      - tempo
    networks:
      - messagefeed-network

  # ==================== Grafana 统一观测界面 ====================
  grafana:
    image: grafana/grafana:12.3.0
    container_name: messagefeed-grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - messagefeed-network

# ==================== 网络定义 ====================
networks:
  messagefeed-network:
    driver: bridge
    name: messagefeed-network

# ==================== 数据卷定义 ====================
volumes:
  # PostgreSQL 数据持久化卷
  postgres_data:
    driver: local
    name: messagefeed-postgres-data
  prometheus_data:
    driver: local
    name: messagefeed-prometheus-data
  loki_data:
    driver: local
    name: messagefeed-loki-data
  tempo_data:
    driver: local
    name: messagefeed-tempo-data
  grafana_data:
    driver: local
    name: messagefeed-grafana-data
  go_mod_cache:
    driver: local
    name: messagefeed-go-mod-cache
  go_build_cache:
    driver: local
    name: messagefeed-go-build-cache
  web_node_modules:
    driver: local
    name: messagefeed-web-node-modules
  caddy_data:
    driver: local
    name: messagefeed-caddy-data
  caddy_config:
    driver: local
    name: messagefeed-caddy-config
