# messageFeed docker-compose 配置
# 本文件定义阶段一本地开发和部署所需的服务。

version: '3.9'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: messagefeed-postgres
    restart: unless-stopped

    # 环境变量配置
    environment:
      # 数据库超级用户密码（仅开发环境使用简单密码，生产环境应使用强密码）
      POSTGRES_PASSWORD: devpassword
      # 应用数据库名称
      POSTGRES_DB: messagefeed
      # 应用数据库用户
      POSTGRES_USER: messagefeed
      # 时区设置
      TZ: UTC
      PGTZ: UTC

    # 端口映射（宿主机:容器）
    # 映射到宿主机便于本地开发时直接连接数据库
    ports:
      - "5432:5432"

    # 数据卷挂载
    # 持久化数据库数据，避免容器重启后数据丢失
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 挂载初始化脚本目录，容器首次启动时自动执行
      - ./migrations:/docker-entrypoint-initdb.d:ro

    # 健康检查
    # 确保数据库完全启动后再启动依赖服务
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messagefeed -d messagefeed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # 网络配置
    networks:
      - messagefeed-network

  # ==================== messageFeed API 服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: messagefeed:latest
    container_name: messagefeed-api
    restart: unless-stopped

    # 依赖关系：等待 PostgreSQL 健康检查通过后再启动
    depends_on:
      postgres:
        condition: service_healthy

    # 环境变量配置
    environment:
      # HTTP 服务配置
      BIND_ADDR: 0.0.0.0:60001
      PUBLIC_BASE_URL: http://localhost:60001

      # 运行时配置
      APP_NODE_ID: docker-api-1
      DEPLOYMENT_MODE: single_node
      LOG_LEVEL: info

      # 数据库配置
      DATABASE_URL: postgres://messagefeed:devpassword@postgres:5432/messagefeed?sslmode=disable

      # 时区设置
      TZ: UTC

    # 端口映射
    ports:
      - "60001:60001"

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:60001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    # 网络配置
    networks:
      - messagefeed-network

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==================== 网络定义 ====================
networks:
  messagefeed-network:
    driver: bridge
    name: messagefeed-network

# ==================== 数据卷定义 ====================
volumes:
  # PostgreSQL 数据持久化卷
  postgres_data:
    driver: local
    name: messagefeed-postgres-data
